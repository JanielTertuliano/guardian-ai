services:
  guardian-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardian-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./chromadb_cache:/app/chromadb_cache
      - ./prompts:/app/prompts
    restart: unless-stopped

  guardian-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardian-ui
    command: streamlit run src/app.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env
    environment:
      - GUARDIAN_API_URL=http://guardian-api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./chromadb_cache:/app/chromadb_cache
      - ./prompts:/app/prompts
    depends_on:
      - guardian-api
    restart: unless-stopped
